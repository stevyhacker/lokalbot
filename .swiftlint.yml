# SwiftLint ruleset for LokalBot (product: BotinaV2).
#
# Tuned to be LENIENT. The lint workflow runs `swiftlint lint --strict`
# (.github/workflows/lint.yml), where ANY violation — warning OR error — fails
# the check. So every rule left active below is one the current codebase
# already satisfies; the disabled list and loosened thresholds exist purely to
# keep `--strict` green on existing code, not to impose a new style on an
# un-audited tree. Re-tighten deliberately, rule by rule, once a baseline pass
# has been cleaned up.

# Lint only the hand-written Swift sources; generated/vendored trees are out.
included:
  - LokalBot
  - CLI
  - LokalBotTests

excluded:
  - .build              # SwiftPM checkouts + build products
  - Vendor              # fetched llama.cpp server, dylibs, and GGUF models
  - DerivedData
  - build               # release.yml archive / DMG output
  - LokalBot.xcodeproj  # generated by XcodeGen (gitignored)
  - "**/*.generated.swift"

disabled_rules:
  # --- Structural caps: enforcing these fights the architecture, not style.
  #     The app has legitimately large SwiftUI views (SettingsView) and a
  #     multi-stage processing pipeline. ---
  - file_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity
  - function_parameter_count
  - nesting
  - large_tuple                 # e.g. (app:, title:, start:) activity tuples

  # --- Deliberate house-style choices in the existing code. ---
  - trailing_comma              # trailing commas are used throughout for clean diffs
  - vertical_whitespace         # occasional double blank lines separate sections
  - shorthand_operator          # `result = result + Text(...)` reads clearer than `+=`
  - identifier_name             # single-char loop vars (`i`) and short names (`id`)

  # --- Force operators: one documented `as!` bridges the AX C API
  #     (ActivityTracker window-title read). `force_try` stays ON as a guardrail
  #     since the tree has no `try!`. ---
  - force_cast

  # --- Closure / loop stylistic rules that fire on idiomatic SwiftUI/AppKit and
  #     on the named closure params used across the codebase. ---
  - unused_closure_parameter
  - for_where
  - multiple_closures_with_trailing_closure

  # --- TODO/FIXME markers are working notes here, not lint failures. ---
  - todo

  # --- String<->Data conversion style (2026-07-03): these two became default
  #     rules in a newer SwiftLint than this config was baselined against and
  #     fired on ~25 existing call sites at once. They express a preference
  #     between two equally correct APIs (`Data(str.utf8)` vs
  #     `str.data(using: .utf8)`, `String(bytes:encoding:)` vs
  #     `String(data:encoding:)`), not a defect. Disabled to keep `--strict`
  #     green per the lenient philosophy above; re-enable with a tree-wide
  #     sweep if the house style settles on the non-optional initializers. ---
  - non_optional_string_data_conversion
  - optional_data_string_conversion

# Keep line_length active but warning-first and above the current maximum.
# The codebase has intentional single-line string literals (SwiftUI `Text` and
# LLM system prompts) up to ~310 chars; under `--strict` a 140 cap would fail
# the check on ~16 existing lines, so the threshold is raised to stay green.
# Re-tighten toward `warning: 140 / error: 200` once long literals are split
# into multi-line (`"""`) strings or extracted to constants.
line_length:
  warning: 400
  error: 500
  ignores_comments: true
  ignores_urls: true

# No opt_in_rules are enabled on purpose: opting in would risk fresh violations
# across an un-pre-linted tree, which `--strict` rejects. Add them back one at a
# time after confirming the tree stays clean.
