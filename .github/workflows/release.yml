# Tag-triggered release pipeline for LokalBot.
#
# Automates the manual flow in RELEASING.md: import the Developer ID
# certificate into a temporary keychain, archive + export with Hardened
# Runtime forced ON (the project.yml default is OFF for fast local builds),
# build the styled DMG, notarize + staple both the app and the DMG, Sparkle-
# sign the DMG, render appcast.xml, and upload DMG + appcast to the GitHub
# Release for the tag.
#
# Required repo secrets (see RELEASING.md "CI release"):
#   MACOS_CERTIFICATE      base64 of the Developer ID Application .p12
#   MACOS_CERTIFICATE_PWD  the .p12 passphrase
#   KEYCHAIN_PWD           throwaway password for the temp keychain
#   NOTARY_APPLE_ID        Apple ID used for notarytool
#   NOTARY_APPLE_TEAM_ID   team ID (3N8B4562P4)
#   NOTARY_APPLE_PWD       app-specific password for notarytool
#   SPARKLE_PRIVATE_KEY    base64 Ed25519 private key; written to a temp file
#                          and passed to generate_appcast.py --ed-key-file.
#                          The private key must NEVER be committed to the repo.

name: Release

on:
  push:
    tags: ["v*"]

# One release build at a time; never cancel a run that may already be
# notarizing or uploading.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the Release and upload DMG + appcast

jobs:
  release:
    name: Archive, notarize, publish
    runs-on: macos-15
    # A cache miss includes a full llama.cpp source build before archive,
    # export, two notarization submissions, stapling, and publication.
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      # Fail fast if the tag doesn't match the Info.plist marketing version —
      # Sparkle's enclosure URL embeds the tag, so a mismatch ships a feed
      # pointing at the wrong asset path.
      - name: Verify tag matches CFBundleShortVersionString
        run: |
          short_version=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' LokalBot/Info.plist)
          tag="${GITHUB_REF_NAME#v}"
          if [[ "${tag%%-*}" != "$short_version" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match CFBundleShortVersionString $short_version. Bump LokalBot/Info.plist first (RELEASING.md step 1)." >&2
            exit 1
          fi

      - name: Validate release secrets
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_APPLE_TEAM_ID: ${{ secrets.NOTARY_APPLE_TEAM_ID }}
          NOTARY_APPLE_PWD: ${{ secrets.NOTARY_APPLE_PWD }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          missing=()
          for name in \
            MACOS_CERTIFICATE MACOS_CERTIFICATE_PWD KEYCHAIN_PWD \
            NOTARY_APPLE_ID NOTARY_APPLE_TEAM_ID NOTARY_APPLE_PWD \
            SPARKLE_PRIVATE_KEY; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} )); then
            printf '::error::Missing required release secret: %s\n' "${missing[@]}"
            exit 1
          fi

      # Developer ID signing needs the certificate in a keychain codesign can
      # reach. A dedicated temp keychain keeps the runner's login keychain out
      # of the picture and is deleted in the always() cleanup step below.
      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          keychain="$RUNNER_TEMP/release.keychain-db"
          security create-keychain -p "$KEYCHAIN_PWD" "$keychain"
          security set-keychain-settings -lut 3600 "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$keychain"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$keychain" \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          rm "$RUNNER_TEMP/cert.p12"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PWD" "$keychain" > /dev/null
          security list-keychains -d user -s "$keychain" login.keychain-db
          if ! security find-identity -v -p codesigning "$keychain" | \
            grep -F 'Developer ID Application'; then
            echo '::error::The imported .p12 does not contain a usable Developer ID Application identity.' >&2
            exit 1
          fi

      - name: Install build tools
        run: |
          if ! command -v xcodegen >/dev/null; then
            brew install xcodegen
          fi
          if ! command -v cmake >/dev/null; then
            brew install cmake
          fi
          xcodegen --version
          cmake --version

      # project.yml lists Vendor/llama-cpp and Vendor/sherpa-onnx as folder
      # references, and XcodeGen validates those paths exist before it will
      # generate. Empty dirs satisfy generation; the contents arrive via the
      # cache/fetch steps below and the pre-build fetch phases.
      - name: Create vendor dirs for XcodeGen
        run: mkdir -p Vendor/llama-cpp Vendor/sherpa-onnx

      - name: Generate project
        run: xcodegen generate

      - name: Cache llama.cpp vendor
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: Vendor
          key: vendor-${{ runner.os }}-${{ hashFiles('Scripts/fetch-llama.sh') }}

      - name: Fetch llama.cpp vendor
        run: bash Scripts/fetch-llama.sh

      # Hardened Runtime must be ON for notarization; the project default is
      # OFF (project.yml) so local dev builds stay fast. Overriding here is the
      # release-time flip RELEASING.md step 2 documents.
      - name: Archive (Release, Hardened Runtime ON)
        env:
          APPLE_TEAM_ID: ${{ secrets.NOTARY_APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project LokalBot.xcodeproj \
            -scheme LokalBot \
            -configuration Release \
            -archivePath build/LokalBot.xcarchive \
            ENABLE_HARDENED_RUNTIME=YES \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application"

      - name: Export Developer ID app
        env:
          APPLE_TEAM_ID: ${{ secrets.NOTARY_APPLE_TEAM_ID }}
        run: |
          cat > build/exportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>developer-id</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>automatic</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/LokalBot.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/exportOptions.plist

      - name: Verify exported signatures and secure timestamps
        run: |
          codesign --verify --deep --strict --verbose=2 build/export/LokalBot.app
          missing_timestamp=0
          while IFS= read -r -d '' item; do
            file -b "$item" | grep -q 'Mach-O' || continue
            if ! codesign --display --verbose=2 "$item" 2>&1 | grep -q '^Timestamp='; then
              echo "::error::Missing secure timestamp: $item" >&2
              missing_timestamp=1
            fi
          done < <(find build/export/LokalBot.app -type f \( -perm -111 -o -name '*.dylib' \) -print0)
          if (( missing_timestamp )); then exit 1; fi

      # Staple the app itself (not just the DMG) so first launch succeeds
      # offline after drag-install.
      - name: Notarize + staple the app
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_APPLE_TEAM_ID: ${{ secrets.NOTARY_APPLE_TEAM_ID }}
          NOTARY_APPLE_PWD: ${{ secrets.NOTARY_APPLE_PWD }}
        run: |
          ditto -c -k --keepParent build/export/LokalBot.app build/LokalBot-app.zip
          xcrun notarytool submit build/LokalBot-app.zip \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_APPLE_TEAM_ID" \
            --password "$NOTARY_APPLE_PWD" \
            --wait
          xcrun stapler staple build/export/LokalBot.app
          xcrun stapler validate build/export/LokalBot.app
          spctl --assess --type execute --verbose=2 build/export/LokalBot.app

      - name: Build styled DMG
        run: |
          python3 -m pip install --quiet 'dmgbuild==1.6.7'
          python3 Scripts/build_release_dmg.py \
            --app build/export/LokalBot.app \
            --output build/LokalBot.dmg

      - name: Notarize + staple the DMG
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_APPLE_TEAM_ID: ${{ secrets.NOTARY_APPLE_TEAM_ID }}
          NOTARY_APPLE_PWD: ${{ secrets.NOTARY_APPLE_PWD }}
        run: |
          codesign --force --sign "Developer ID Application" --timestamp build/LokalBot.dmg
          codesign --verify --strict --verbose=2 build/LokalBot.dmg
          xcrun notarytool submit build/LokalBot.dmg \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_APPLE_TEAM_ID" \
            --password "$NOTARY_APPLE_PWD" \
            --wait
          xcrun stapler staple build/LokalBot.dmg
          xcrun stapler validate build/LokalBot.dmg
          spctl --assess --type open --context context:primary-signature \
            --verbose=2 build/LokalBot.dmg

      # sign_update ships in Sparkle's release tarball; the SwiftPM checkout
      # used for the app build doesn't expose it on PATH. Same 2.9.1 pin as
      # project.yml so the signing tool matches the framework we embed.
      - name: Fetch Sparkle sign_update
        run: |
          curl -fsSL -o "$RUNNER_TEMP/Sparkle.tar.xz" \
            https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-2.9.1.tar.xz
          echo 'c0dde519fd2a43ddfc6a1eb76aec284d7d888fe281414f9177de3164d98ba4c7  '"$RUNNER_TEMP/Sparkle.tar.xz" \
            | shasum -a 256 --check
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/Sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"

      # LAST signing step: the Sparkle signature covers the exact stapled DMG
      # bytes, so nothing may touch the DMG after this. The private key exists
      # only as a temp file for the duration of this step.
      - name: Sparkle-sign + generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          key_file="$RUNNER_TEMP/sparkle-ed25519.key"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$key_file"
          # --release-tag: the DMG uploads to THIS tag's release, so the
          # enclosure URL must embed it verbatim. Deriving it from the app's
          # version would drop a pre-release suffix (v1.0.0-beta → v1.0.0)
          # and point the feed at a release that doesn't exist.
          python3 Scripts/generate_appcast.py \
            --archive build/LokalBot.dmg \
            --app build/export/LokalBot.app \
            --repo "$GITHUB_REPOSITORY" \
            --release-tag "$GITHUB_REF_NAME" \
            --output build/appcast.xml \
            --sign-update-tool "$RUNNER_TEMP/sparkle/bin/sign_update" \
            --ed-key-file "$key_file"
          rm -f "$key_file"

      # Upload both assets: the Sparkle feed resolves via
      # releases/latest/download/appcast.xml, so the appcast must live on the
      # Release next to the DMG it signs. Hyphenated tags (v1.0.0-beta) become
      # pre-releases and never become "latest" (RELEASING.md step 7).
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=""
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "LokalBot ${GITHUB_REF_NAME#v}" \
              --generate-notes \
              $prerelease_flag
          fi
          gh release upload "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            build/LokalBot.dmg build/appcast.xml

      - name: Delete temp keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/release.keychain-db" || true
          security list-keychains -d user -s login.keychain-db
