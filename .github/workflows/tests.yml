# PR-time test runner for LokalBot.
#
# Runs `xcodebuild test` against the LokalBot scheme on every PR into
# master/dev and on pushes to those branches. Sibling to Build/Lint/XcodeGen —
# kept separate so each
# gate has one clear failure mode: a broken test can't mask a compile
# regression, and a compile failure doesn't hide which tests would fail.
#
# Pinned to macos-15 (not macos-latest): tests execute the compiled app, so the
# runner OS must stay at or above the app's deployment target (macOS 14.4). A
# fixed runner keeps a future image change from silently moving this gate.

name: Tests

on:
  pull_request:
    branches: [master, dev]
  push:
    branches: [master, dev]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: xcodebuild test (macOS)
    runs-on: macos-15
    # Match the cold-build budget used by the compile gate, then leave room
    # for the full app-hosted test suite before the Vendor cache is warm.
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Toolchain info
        run: |
          xcodebuild -version
          swift --version

      - name: Install build tools
        run: |
          if ! command -v xcodegen >/dev/null; then
            brew install xcodegen
          fi
          if ! command -v cmake >/dev/null; then
            brew install cmake
          fi
          xcodegen --version
          cmake --version

      # project.yml lists Vendor/llama-cpp and Vendor/sherpa-onnx as folder
      # references, and XcodeGen validates those paths exist before it will
      # generate. Empty dirs satisfy generation; the contents arrive via the
      # cache/fetch steps below and the pre-build fetch phases.
      - name: Create vendor dirs for XcodeGen
        run: mkdir -p Vendor/llama-cpp Vendor/sherpa-onnx

      - name: Generate project
        run: xcodegen generate

      # The test host is the full app, so Vendor/ must be populated just like in
      # the Build workflow. The llama + Sherpa fetch scripts jointly key the
      # cache, so either pinned native dependency invalidates stale contents.
      - name: Cache native vendors
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: Vendor
          key: vendor-${{ runner.os }}-${{ hashFiles('Scripts/fetch-llama.sh', 'Scripts/fetch-sherpa.sh') }}

      - name: Fetch llama.cpp vendor
        run: bash Scripts/fetch-llama.sh

      # CODE_SIGNING_ALLOWED=NO because hosted runners hold no dev cert; without
      # it xcodebuild refuses to embed the xctest bundle into the host app.
      #
      # NOTE: any test that drives on-device Apple Intelligence / FoundationModels
      # (absent and non-deterministic on hosted runners) must self-skip via a
      # model-availability guard, or be excluded here with `-skip-testing:`.
      - name: Run tests
        run: |
          xcodebuild test \
            -project LokalBot.xcodeproj \
            -scheme LokalBot \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
