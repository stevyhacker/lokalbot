<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="ttl">LokalBot — the local-LLM super-app for your Mac</title>
  <desc id="dsc">One on-device language model at the center, connected to seven capabilities: meetings, cotyping autocomplete, chat, search, day timeline, agent CLI and bring-your-own models. Everything runs locally — nothing leaves the device.</desc>
  <style>
    .lab{font-size:13px;font-weight:650;fill:#EEF4F7;}
    .sub{font-size:10.5px;font-weight:450;fill:#8BA0AD;}
    .ico{fill:none;stroke:#D7EEE9;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
    .icf{fill:#D7EEE9;}
    @media (prefers-reduced-motion: no-preference){
      .pulse{animation:pz 3.4s ease-in-out infinite;}
      .spin{animation:dz 28s linear infinite;}
    }
    @keyframes pz{0%,100%{opacity:.10}50%{opacity:.26}}
    @keyframes dz{to{stroke-dashoffset:-300}}
  </style>

  <!-- stage -->
  <rect x="6" y="6" width="668" height="688" rx="26" fill="#0B1119" stroke="#1B2632"/>

  <!-- connectors -->
  <g stroke="#243443" stroke-width="1.5">
    <line x1="340" y1="400" x2="422" y2="229"/>
    <line x1="340" y1="400" x2="525" y2="358"/>
    <line x1="340" y1="400" x2="489" y2="519"/>
    <line x1="340" y1="400" x2="340" y2="590"/>
    <line x1="340" y1="400" x2="191" y2="519"/>
    <line x1="340" y1="400" x2="155" y2="358"/>
    <line x1="340" y1="400" x2="258" y2="229"/>
  </g>

  <!-- device boundary -->
  <circle class="spin" cx="340" cy="400" r="224" fill="none" stroke="#23C4AE" stroke-opacity="0.22" stroke-width="1.4" stroke-dasharray="2 7"/>

  <!-- core glow + node -->
  <circle cx="340" cy="400" r="110" fill="#23C4AE" opacity="0.05"/>
  <circle class="pulse" cx="340" cy="400" r="86" fill="#23C4AE" opacity="0.10"/>
  <circle cx="340" cy="400" r="66" fill="#23C4AE" opacity="0.12"/>
  <circle cx="340" cy="400" r="56" fill="#0E141C" stroke="#23C4AE" stroke-width="2"/>
  <text x="340" y="391" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="1.2" fill="#FFFFFF">LOCAL LLM</text>
  <text x="340" y="407" text-anchor="middle" font-size="10.5" fill="#A2B4C2">one on-device model</text>
  <text x="340" y="423" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6EF2DC">0 cloud calls</text>

  <!-- A Meetings -->
  <g>
    <rect x="346" y="200" width="152" height="58" rx="14" fill="#121A25" stroke="#283644"/>
    <rect x="358" y="216" width="26" height="26" rx="7" fill="#0F2A26" stroke="#23C4AE" stroke-opacity="0.5"/>
    <circle class="ico" cx="368" cy="229" r="3.5"/><circle class="ico" cx="374" cy="229" r="3.5"/>
    <text class="lab" x="394" y="226">Meetings</text>
    <text class="sub" x="394" y="242">Records both sides</text>
  </g>
  <!-- B Cotyping -->
  <g>
    <rect x="449" y="329" width="152" height="58" rx="14" fill="#121A25" stroke="#283644"/>
    <rect x="461" y="345" width="26" height="26" rx="7" fill="#0F2A26" stroke="#23C4AE" stroke-opacity="0.5"/>
    <line class="ico" x1="470" y1="353" x2="470" y2="363"/>
    <rect class="icf" x="475" y="354" width="7" height="8" rx="1" opacity="0.45"/>
    <text class="lab" x="497" y="355">Cotyping</text>
    <text class="sub" x="497" y="371">Inline autocomplete</text>
  </g>
  <!-- C Chat -->
  <g>
    <rect x="413" y="490" width="152" height="58" rx="14" fill="#121A25" stroke="#283644"/>
    <rect x="425" y="506" width="26" height="26" rx="7" fill="#0F2A26" stroke="#23C4AE" stroke-opacity="0.5"/>
    <rect class="ico" x="432" y="513" width="12" height="9" rx="3"/>
    <path class="ico" d="M434 522 L432 525 L437 522"/>
    <text class="lab" x="461" y="516">Chat</text>
    <text class="sub" x="461" y="532">Ask your library</text>
  </g>
  <!-- D Search -->
  <g>
    <rect x="264" y="561" width="152" height="58" rx="14" fill="#121A25" stroke="#283644"/>
    <rect x="276" y="577" width="26" height="26" rx="7" fill="#0F2A26" stroke="#23C4AE" stroke-opacity="0.5"/>
    <circle class="ico" cx="288" cy="589" r="4"/>
    <line class="ico" x1="291" y1="592" x2="295" y2="596"/>
    <text class="lab" x="312" y="587">Search</text>
    <text class="sub" x="312" y="603">Semantic + keyword</text>
  </g>
  <!-- E Day timeline -->
  <g>
    <rect x="115" y="490" width="152" height="58" rx="14" fill="#121A25" stroke="#283644"/>
    <rect x="127" y="506" width="26" height="26" rx="7" fill="#0F2A26" stroke="#23C4AE" stroke-opacity="0.5"/>
    <rect class="icf" x="134" y="518" width="3" height="7"/>
    <rect class="icf" x="139" y="513" width="3" height="12"/>
    <rect class="icf" x="144" y="520" width="3" height="5"/>
    <text class="lab" x="163" y="516">Day timeline</text>
    <text class="sub" x="163" y="532">Where time went</text>
  </g>
  <!-- F Agent CLI -->
  <g>
    <rect x="79" y="329" width="152" height="58" rx="14" fill="#121A25" stroke="#283644"/>
    <rect x="91" y="345" width="26" height="26" rx="7" fill="#0F2A26" stroke="#23C4AE" stroke-opacity="0.5"/>
    <path class="ico" d="M99 354 L103 358 L99 362"/>
    <line class="ico" x1="104" y1="362" x2="110" y2="362"/>
    <text class="lab" x="127" y="355">Agent CLI</text>
    <text class="sub" x="127" y="371">For coding agents</text>
  </g>
  <!-- G BYO models -->
  <g>
    <rect x="182" y="200" width="152" height="58" rx="14" fill="#121A25" stroke="#283644"/>
    <rect x="194" y="216" width="26" height="26" rx="7" fill="#0F2A26" stroke="#23C4AE" stroke-opacity="0.5"/>
    <rect class="ico" x="205" y="223" width="10" height="10" rx="2" opacity="0.5"/>
    <rect class="ico" x="201" y="227" width="10" height="10" rx="2"/>
    <text class="lab" x="230" y="226">BYO models</text>
    <text class="sub" x="230" y="242">llama.cpp, Ollama…</text>
  </g>

  <!-- header -->
  <text x="340" y="64" text-anchor="middle" font-size="31" font-weight="800" letter-spacing="-0.5" fill="#FFFFFF">LokalBot</text>
  <text x="340" y="90" text-anchor="middle" font-size="14" font-weight="500" fill="#A2B4C2">The local-LLM super-app for your Mac</text>

  <!-- boundary tag -->
  <rect x="248" y="165" width="184" height="22" rx="11" fill="#0B1119" stroke="#23C4AE" stroke-opacity="0.5"/>
  <text x="340" y="180" text-anchor="middle" font-size="10.5" letter-spacing="0.4" fill="#7FE6D5">nothing leaves your Mac</text>

  <!-- footer -->
  <line x1="70" y1="634" x2="610" y2="634" stroke="#1B2632"/>
  <text x="340" y="657" text-anchor="middle" font-size="12" font-weight="600" fill="#C3D2DC">100% on-device&#160;&#160;·&#160;&#160;no account&#160;&#160;·&#160;&#160;open source&#160;&#160;·&#160;&#160;Apple Silicon</text>
  <text x="340" y="678" text-anchor="middle" font-size="11" fill="#6F8696">25+ languages&#160;&#160;·&#160;&#160;~190× realtime&#160;&#160;·&#160;&#160;8 models / 5 engines&#160;&#160;·&#160;&#160;AES-GCM encrypted</text>
</svg>
