<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 560 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="t">LokalBot day timeline and digest</title>
  <desc id="d">A private day timeline: a colour-coded bar of which app was in front through the day, a time-by-app breakdown (Xcode 3h 40m, Meetings 1h 15m, Chrome 55m, Slack 30m), a generated daily digest, and an "ask your day" box — all from on-device activity, nothing uploaded.</desc>
  <defs>
    <clipPath id="barclip"><rect x="24" y="72" width="512" height="26" rx="8"/></clipPath>
  </defs>

  <!-- card -->
  <rect x="4" y="4" width="552" height="472" rx="18" fill="#0E141C" stroke="#1B2632"/>

  <!-- window chrome -->
  <circle cx="26" cy="24" r="5" fill="#2a3744"/>
  <circle cx="42" cy="24" r="5" fill="#2a3744"/>
  <circle cx="58" cy="24" r="5" fill="#2a3744"/>
  <text x="88" y="28" font-size="12" font-weight="600" fill="#a2b4c2">Timeline · Wednesday</text>
  <line x1="4" y1="44" x2="556" y2="44" stroke="#1B2632"/>

  <!-- day bar -->
  <text x="24" y="64" font-size="11" font-weight="600" letter-spacing="0.4" fill="#23c4ae">YOUR DAY</text>
  <rect x="24" y="72" width="512" height="26" rx="8" fill="#0b1119"/>
  <g clip-path="url(#barclip)">
    <rect x="24"  y="72" width="132" height="26" fill="#23c4ae"/>
    <rect x="156" y="72" width="67"  height="26" fill="#8b7bf0"/>
    <rect x="223" y="72" width="38"  height="26" fill="#1a9d8c"/>
    <rect x="261" y="72" width="29"  height="26" fill="#1b2632"/>
    <rect x="290" y="72" width="104" height="26" fill="#23c4ae"/>
    <rect x="394" y="72" width="28"  height="26" fill="#6ef2dc"/>
    <rect x="422" y="72" width="38"  height="26" fill="#8b7bf0"/>
    <rect x="460" y="72" width="76"  height="26" fill="#23c4ae"/>
  </g>
  <!-- hour ticks -->
  <g font-size="10" fill="#6f8696" text-anchor="middle">
    <text x="24" y="116">9</text>
    <text x="138" y="116">11</text>
    <text x="252" y="116">1</text>
    <text x="365" y="116">3</text>
    <text x="479" y="116">5</text>
  </g>

  <!-- time by app -->
  <text x="24" y="142" font-size="11" font-weight="600" letter-spacing="0.4" fill="#23c4ae">TIME BY APP</text>
  <!-- row 1 -->
  <circle cx="30" cy="156" r="5" fill="#23c4ae"/>
  <text x="44" y="160" font-size="12.5" fill="#ECF3F7">Xcode</text>
  <rect x="150" y="149" width="250" height="8" rx="4" fill="#17202b"/>
  <rect x="150" y="149" width="200" height="8" rx="4" fill="#23c4ae"/>
  <text x="532" y="160" font-size="11.5" text-anchor="end" fill="#a2b4c2">3h 40m</text>
  <!-- row 2 -->
  <circle cx="30" cy="184" r="5" fill="#8b7bf0"/>
  <text x="44" y="188" font-size="12.5" fill="#ECF3F7">Meetings</text>
  <rect x="150" y="177" width="250" height="8" rx="4" fill="#17202b"/>
  <rect x="150" y="177" width="75" height="8" rx="4" fill="#8b7bf0"/>
  <text x="532" y="188" font-size="11.5" text-anchor="end" fill="#a2b4c2">1h 15m</text>
  <!-- row 3 -->
  <circle cx="30" cy="212" r="5" fill="#1a9d8c"/>
  <text x="44" y="216" font-size="12.5" fill="#ECF3F7">Chrome</text>
  <rect x="150" y="205" width="250" height="8" rx="4" fill="#17202b"/>
  <rect x="150" y="205" width="55" height="8" rx="4" fill="#1a9d8c"/>
  <text x="532" y="216" font-size="11.5" text-anchor="end" fill="#a2b4c2">55m</text>
  <!-- row 4 -->
  <circle cx="30" cy="240" r="5" fill="#6ef2dc"/>
  <text x="44" y="244" font-size="12.5" fill="#ECF3F7">Slack</text>
  <rect x="150" y="233" width="250" height="8" rx="4" fill="#17202b"/>
  <rect x="150" y="233" width="30" height="8" rx="4" fill="#6ef2dc"/>
  <text x="532" y="244" font-size="11.5" text-anchor="end" fill="#a2b4c2">30m</text>

  <line x1="24" y1="266" x2="536" y2="266" stroke="#1B2632"/>

  <!-- daily digest card -->
  <rect x="24" y="282" width="512" height="88" rx="12" fill="#121a25" stroke="#232c3a"/>
  <text x="40" y="306" font-size="12" font-weight="700" fill="#6ef2dc">Daily digest <tspan font-weight="400" fill="#6f8696">· generated on-device</tspan></text>
  <text x="40" y="330" font-size="11.5" fill="#a2b4c2">— Shipped the on-device build; 3 PRs merged.</text>
  <text x="40" y="350" font-size="11.5" fill="#a2b4c2">— 3 meetings · 4 action items · 2h 20m focused in Xcode.</text>

  <!-- ask your day -->
  <rect x="24" y="392" width="512" height="44" rx="22" fill="#0b1119" stroke="#2a3744"/>
  <text x="44" y="419" font-size="12.5" fill="#6f8696">Ask your day — what did I spend the most time on?</text>
  <circle cx="512" cy="414" r="15" fill="#23c4ae"/>
  <path d="M506 414 H517 M512.5 409 L517 414 L512.5 419" fill="none" stroke="#04141a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
