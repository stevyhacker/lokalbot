<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- LokalBotV3 — an L-shaped robot. The L is the body; the foot doubles
       as a recorder with a waveform. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#222e3d"/>
      <stop offset="1" stop-color="#0e141c"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ef2dc"/>
      <stop offset="1" stop-color="#23c4ae"/>
    </linearGradient>
  </defs>

  <!-- macOS squircle-ish plate -->
  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#bg)"/>

  <!-- antenna -->
  <rect x="372" y="206" width="36" height="86" rx="18" fill="#3a7d72"/>
  <circle cx="390" cy="186" r="42" fill="#fbbf24"/>

  <!-- L body: vertical stroke -->
  <rect x="268" y="276" width="244" height="484" rx="62" fill="url(#body)"/>
  <!-- L foot: horizontal stroke -->
  <rect x="268" y="592" width="492" height="168" rx="62" fill="url(#body)"/>

  <!-- face panel + eye -->
  <rect x="312" y="326" width="156" height="118" rx="38" fill="#0e141c"/>
  <circle cx="390" cy="385" r="34" fill="#6ef2dc"/>
  <circle cx="402" cy="373" r="10" fill="#eafffa"/>

  <!-- arm resting on the foot -->
  <rect x="206" y="430" width="44" height="180" rx="22" fill="#3a7d72"/>

  <!-- waveform on the foot (recording) -->
  <g fill="#0e141c">
    <rect x="556" y="646" width="26" height="60" rx="13"/>
    <rect x="602" y="624" width="26" height="104" rx="13"/>
    <rect x="648" y="638" width="26" height="76" rx="13"/>
    <rect x="694" y="654" width="26" height="44" rx="13"/>
  </g>
</svg>
