name: LokalBot
options:
  bundleIdPrefix: me.dotenv
  deploymentTarget:
    macOS: "15.0"   # Qwen3-ASR's MLX Swift package requires macOS 15+
  minimumXcodeGenVersion: "2.40"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

# Shared across EVERY target (incl. LokalBotTests, which `import LlamaCore`
# directly): point the compiler at the vendored b9844 headers + the generated
# LlamaCore module map so `import LlamaCore` resolves. Link flags / rpath live
# on the LokalBotApp template only — see its settings.base below.
settings:
  base:
    HEADER_SEARCH_PATHS:
      - $(inherited)
      - $(SRCROOT)/Vendor/llama-cpp/include
    SWIFT_INCLUDE_PATHS:
      - $(inherited)
      - $(SRCROOT)/Vendor/llama-cpp/include

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: 0.15.4   # pinned: 0.x releases break API between minors
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    exactVersion: 1.0.0
  Qwen3Speech:
    url: https://github.com/soniqo/speech-swift
    exactVersion: 0.0.21
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.3.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.1    # pinned to a known-good Developer-ID-signed release
  swift-log:
    url: https://github.com/apple/swift-log.git
    from: "1.5.0"
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.1.0"

# Shared application body. Both `LokalBot` (prod) and `LokalBot Dev` build the
# SAME sources from this template and differ only in identity-bearing settings
# (product name, bundle id, dev compilation flag). The dev build therefore
# holds its OWN Accessibility/Screen-Recording/Mic TCC grant under a distinct
# bundle id, so running from Xcode never disturbs the released app's grants —
# and Sparkle is compiled out of dev (LOKALBOT_DEV) so the prod appcast can never
# replace the dev bundle with the shipped app.
targetTemplates:
  LokalBotApp:
    type: application
    platform: macOS
    sources:
      - LokalBot
      - path: Vendor/llama-cpp
        type: folder
        buildPhase: resources
      - path: Vendor/sherpa-onnx
        type: folder
        buildPhase: resources
      # Bundle SKILL.md inside the app at Contents/Resources/lokalbot-cli/
      # so the installer can symlink it onto the user's PATH-adjacent skill
      # dirs without needing the source repo.
      - path: .agents/skills/lokalbot-cli/SKILL.md
        buildPhase:
          copyFiles:
            destination: resources
            subpath: lokalbot-cli
    dependencies:
      - package: FluidAudio
      - package: WhisperKit
      - package: Qwen3Speech
        product: Qwen3ASR
      - package: Sparkle
        product: Sparkle
      - package: swift-log
        product: Logging
      - package: LaunchAtLogin
        product: LaunchAtLogin
      # Embed the self-contained CLI into Contents/Helpers/ and code-sign it
      # on copy (hardened runtime during a notarised archive). It's a target
      # dependency so it's built first; `link: false` because a tool is
      # copied, not linked into the app.
      - target: lokalbot-cli
        link: false
        embed: true
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Helpers
    preBuildScripts:
      - name: Fetch llama.cpp vendor
        script: "\"$PROJECT_DIR/Scripts/fetch-llama.sh\""
        basedOnDependencyAnalysis: false
      - name: Fetch sherpa-onnx vendor
        script: "\"$PROJECT_DIR/Scripts/fetch-sherpa.sh\""
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Sign bundled native runtimes
        script: "\"$PROJECT_DIR/Scripts/sign-bundled-native-code.sh\""
        basedOnDependencyAnalysis: false
    entitlements:
      path: LokalBot/LokalBot.entitlements
      properties:
        com.apple.security.device.audio-input: true
        # NOTE: App Sandbox intentionally OFF — Core Audio process taps
        # (and later, Accessibility window titles) don't work sandboxed.
        # Direct distribution + notarization, not App Store.
    info:
      path: LokalBot/Info.plist
      properties:
        CFBundleDisplayName: LokalBot
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: "0.1.2"
        CFBundleVersion: "3"
        NSMicrophoneUsageDescription: >-
          LokalBot records your side of meetings from the microphone.
          Audio never leaves this Mac.
        NSAudioCaptureUsageDescription: >-
          LokalBot records the meeting app's audio output so the other
          participants are captured. Audio never leaves this Mac.
        NSCalendarsFullAccessUsageDescription: >-
          LokalBot reads your calendar to confirm meetings and title
          recordings. Calendar data never leaves this Mac.
        LSApplicationCategoryType: public.app-category.productivity
        # Sparkle auto-update. SUFeedURL points at the appcast published with
        # each GitHub release; SUPublicEDKey is the ed25519 public key whose
        # private half signs the DMG. AppUpdateManager refuses to start Sparkle
        # unless these are real (see RELEASING.md), so forks with placeholder
        # values never self-update by accident.
        SUFeedURL: https://github.com/stevyhacker/lokalbot/releases/latest/download/appcast.xml
        SUPublicEDKey: R1A2lIfQ82UnkmUd12kwgpiS3tOlb6D0pVK8sKSrZdA=
        SUScheduledCheckInterval: 86400
        SUEnableAutomaticChecks: false
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ENABLE_HARDENED_RUNTIME: NO   # turn ON (+ audio-input exception) for notarized release builds
        CODE_SIGN_STYLE: Automatic
        # Stable signature so TCC grants (Accessibility, Screen Recording)
        # survive rebuilds — ad-hoc signing invalidates them every build.
        DEVELOPMENT_TEAM: K96P3M3997
        GENERATE_INFOPLIST_FILE: NO
        # In-process libllama: link the vendored dylib (-lllama resolves the
        # libllama.dylib symlink in Vendor/llama-cpp) and make its @rpath install
        # name (@rpath/libllama.0.dylib) resolve at runtime against the copies the
        # Vendor/llama-cpp folder-resource phase places in Contents/Resources/llama-cpp.
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Vendor/llama-cpp
        OTHER_LDFLAGS:
          - $(inherited)
          - -lllama
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
          - "@executable_path/../Resources/llama-cpp"

targets:
  LokalBot:
    templates:
      - LokalBotApp
    settings:
      base:
        PRODUCT_NAME: LokalBot
        PRODUCT_MODULE_NAME: LokalBot
        PRODUCT_BUNDLE_IDENTIFIER: me.dotenv.LokalBot

  # Local development build. Distinct bundle id + product name means a separate,
  # stable TCC identity (Mic, Screen Recording, Accessibility survive rebuilds),
  # and LOKALBOT_DEV compiles Sparkle's launch path out so the prod appcast never
  # swaps this bundle for the released app. Keep LOKALBOT_DEV under `base:` so it
  # is defined in EVERY configuration (Release included) — a Release-config dev
  # build (Profile/Archive) must still keep Sparkle inert.
  "LokalBot Dev":
    templates:
      - LokalBotApp
    settings:
      base:
        PRODUCT_NAME: "LokalBot Dev"
        PRODUCT_MODULE_NAME: LokalBotDev
        PRODUCT_BUNDLE_IDENTIFIER: me.dotenv.LokalBot.dev
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: LOKALBOT_DEV $(inherited)

  # UI-test host. Same app sources and dev-only Sparkle behavior, but compiled
  # without the menu-bar extra so XCUITest can launch and snapshot a normal
  # foreground window reliably.
  "LokalBot UI Test Host":
    templates:
      - LokalBotApp
    settings:
      base:
        PRODUCT_NAME: "LokalBot UI Test Host"
        PRODUCT_MODULE_NAME: LokalBotUITestHost
        PRODUCT_BUNDLE_IDENTIFIER: me.dotenv.LokalBot.uitesthost
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: LOKALBOT_DEV LOKALBOT_UI_TEST_HOST $(inherited)

  LokalBotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - LokalBotTests
    dependencies:
      - target: LokalBot
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LokalBot.app/Contents/MacOS/LokalBot"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: LokalBotTests
        PRODUCT_BUNDLE_IDENTIFIER: me.dotenv.LokalBotTests
        # Tests that `import LlamaCore` and call libllama C functions directly
        # must link the dylib themselves: -bundle_loader only resolves symbols
        # DEFINED IN the host executable, and the llama_* symbols live in
        # libllama.dylib (which the host only *loads*, not defines). Link it here
        # and add an rpath that reaches the host app's Contents/Resources/llama-cpp
        # copies — both from the injected .xctest binary (@loader_path) and from
        # the host app executable (@executable_path), since at runtime the test
        # bundle is loaded inside the TEST_HOST process.
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Vendor/llama-cpp
        OTHER_LDFLAGS:
          - $(inherited)
          - -lllama
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Resources/llama-cpp"
          - "@loader_path/../../../../Resources/llama-cpp"

  # Synthetic-data UI tests. Drives the UI-test host app via
  # XCUITest with `LOKALBOT_UI_TEST=1` so the app skips Core Audio polling,
  # the accessibility-trusted meeting detector, Sparkle and screenshots —
  # the suite renders the SwiftUI surfaces against a synthetic meetings
  # library planted under `LOKALBOT_STORAGE_ROOT` (a per-test tmp dir).
  # No TCC permissions required. The host bundle id avoids collisions with a
  # user's installed/running production or development LokalBot app.
  LokalBotUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - LokalBotUITests
    dependencies:
      - target: "LokalBot UI Test Host"
    settings:
      base:
        TEST_TARGET_NAME: "LokalBot UI Test Host"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: LokalBotUITests
        PRODUCT_BUNDLE_IDENTIFIER: me.dotenv.LokalBotUITests

  lokalbot-cli:
    type: tool
    platform: macOS
    sources:
      - CLI
      - LokalBot/CLISupport
      - path: LokalBot/Models/Meeting.swift
      - path: LokalBot/Models/Transcript.swift
      - path: LokalBot/Models/AppIdentifiers.swift
      - path: LokalBot/Models/AppDirectories.swift
    dependencies:
      - package: ArgumentParser
        product: ArgumentParser
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        PRODUCT_NAME: lokalbot-cli
        PRODUCT_MODULE_NAME: lokalbot_cli
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: K96P3M3997
        ENABLE_HARDENED_RUNTIME: NO  # flip ON in notarised release builds
        GENERATE_INFOPLIST_FILE: YES
        # Embedded into LokalBot.app/Contents/Helpers rather than installed
        # as a standalone product, so keep it out of the archive's
        # install location.
        SKIP_INSTALL: YES
