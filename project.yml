name: LokalBot
options:
  bundleIdPrefix: com.dotenv
  deploymentTarget:
    macOS: "14.4"   # Core Audio process taps require 14.4+
  minimumXcodeGenVersion: "2.40"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: 0.15.2   # pinned: 0.x releases break API between minors
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    exactVersion: 1.0.0
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.3.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.1    # pinned to a known-good Developer-ID-signed release
  swift-log:
    url: https://github.com/apple/swift-log.git
    from: "1.5.0"
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.1.0"

# Shared application body. Both `LokalBot` (prod) and `LokalBot Dev` build the
# SAME sources from this template and differ only in identity-bearing settings
# (product name, bundle id, dev compilation flag). The dev build therefore
# holds its OWN Accessibility/Screen-Recording/Mic TCC grant under a distinct
# bundle id, so running from Xcode never disturbs the released app's grants —
# and Sparkle is compiled out of dev (LOKALBOTV3_DEV) so the prod appcast can never
# replace the dev bundle with the shipped app.
targetTemplates:
  LokalBotV3App:
    type: application
    platform: macOS
    sources:
      - LokalBot
      - path: Vendor/llama-cpp
        type: folder
        buildPhase: resources
      - path: Vendor/llama-models
        type: folder
        buildPhase: resources
      - path: Vendor/sherpa-onnx
        type: folder
        buildPhase: resources
      # Bundle SKILL.md inside the app at Contents/Resources/lokalbot-cli/
      # so the installer can symlink it onto the user's PATH-adjacent skill
      # dirs without needing the source repo.
      - path: .agents/skills/lokalbot-cli/SKILL.md
        buildPhase:
          copyFiles:
            destination: resources
            subpath: lokalbot-cli
    dependencies:
      - package: FluidAudio
      - package: WhisperKit
      - package: Sparkle
        product: Sparkle
      - package: swift-log
        product: Logging
      - package: LaunchAtLogin
        product: LaunchAtLogin
      # Embed the self-contained CLI into Contents/Helpers/ and code-sign it
      # on copy (hardened runtime during a notarised archive). It's a target
      # dependency so it's built first; `link: false` because a tool is
      # copied, not linked into the app.
      - target: lokalbot-cli
        link: false
        embed: true
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Helpers
    preBuildScripts:
      - name: Fetch llama.cpp vendor
        script: "\"$PROJECT_DIR/Scripts/fetch-llama.sh\""
        basedOnDependencyAnalysis: false
      - name: Fetch sherpa-onnx vendor
        script: "\"$PROJECT_DIR/Scripts/fetch-sherpa.sh\""
        basedOnDependencyAnalysis: false
    entitlements:
      path: LokalBot/LokalBot.entitlements
      properties:
        com.apple.security.device.audio-input: true
        # NOTE: App Sandbox intentionally OFF — Core Audio process taps
        # (and later, Accessibility window titles) don't work sandboxed.
        # Direct distribution + notarization, not App Store.
    info:
      path: LokalBot/Info.plist
      properties:
        CFBundleDisplayName: LokalBotV3
        CFBundleIconFile: AppIcon
        NSMicrophoneUsageDescription: >-
          LokalBotV3 records your side of meetings from the microphone.
          Audio never leaves this Mac.
        NSAudioCaptureUsageDescription: >-
          LokalBotV3 records the meeting app's audio output so the other
          participants are captured. Audio never leaves this Mac.
        NSCalendarsFullAccessUsageDescription: >-
          LokalBotV3 reads your calendar to confirm meetings and title
          recordings. Calendar data never leaves this Mac.
        LSApplicationCategoryType: public.app-category.productivity
        # Sparkle auto-update. SUFeedURL points at the appcast published with
        # each GitHub release; SUPublicEDKey is the ed25519 public key whose
        # private half signs the DMG. Both ship as documented placeholders —
        # AppUpdateManager refuses to start Sparkle until they are real
        # (see RELEASING.md), so a fresh clone never self-updates by accident.
        SUFeedURL: https://github.com/OWNER/REPO/releases/latest/download/appcast.xml
        SUPublicEDKey: REPLACE_WITH_GENERATED_SPARKLE_PUBLIC_ED_KEY
        SUScheduledCheckInterval: 86400
        SUEnableAutomaticChecks: false
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.4"
        ENABLE_HARDENED_RUNTIME: NO   # turn ON (+ audio-input exception) for notarized release builds
        CODE_SIGN_STYLE: Automatic
        # Stable signature so TCC grants (Accessibility, Screen Recording)
        # survive rebuilds — ad-hoc signing invalidates them every build.
        DEVELOPMENT_TEAM: K96P3M3997
        GENERATE_INFOPLIST_FILE: NO

targets:
  LokalBot:
    templates:
      - LokalBotV3App
    settings:
      base:
        PRODUCT_NAME: LokalBotV3
        PRODUCT_MODULE_NAME: LokalBotV3
        PRODUCT_BUNDLE_IDENTIFIER: com.dotenv.LokalBotV3

  # Local development build. Distinct bundle id + product name means a separate,
  # stable TCC identity (Mic, Screen Recording, Accessibility survive rebuilds),
  # and LOKALBOTV3_DEV compiles Sparkle's launch path out so the prod appcast never
  # swaps this bundle for the released app. Keep LOKALBOTV3_DEV under `base:` so it
  # is defined in EVERY configuration (Release included) — a Release-config dev
  # build (Profile/Archive) must still keep Sparkle inert.
  "LokalBot Dev":
    templates:
      - LokalBotV3App
    settings:
      base:
        PRODUCT_NAME: "LokalBotV3 Dev"
        PRODUCT_MODULE_NAME: LokalBotV3Dev
        PRODUCT_BUNDLE_IDENTIFIER: com.dotenv.LokalBotV3.dev
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: LOKALBOTV3_DEV $(inherited)

  LokalBotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - LokalBotTests
    dependencies:
      - target: LokalBot
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LokalBotV3.app/Contents/MacOS/LokalBotV3"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: LokalBotV3Tests
        PRODUCT_BUNDLE_IDENTIFIER: com.dotenv.LokalBotV3Tests

  # Synthetic-data UI tests. Drives the LokalBotV3.app binary headlessly via
  # XCUITest with `LOKALBOTV3_UI_TEST=1` so the app skips Core Audio polling,
  # the accessibility-trusted meeting detector, Sparkle and screenshots —
  # the suite renders the SwiftUI surfaces against a synthetic meetings
  # library planted under `LOKALBOTV3_STORAGE_ROOT` (a per-test tmp dir).
  # No TCC permissions required.
  LokalBotUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - LokalBotUITests
    dependencies:
      - target: LokalBot
    settings:
      base:
        TEST_TARGET_NAME: LokalBot
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: LokalBotV3UITests
        PRODUCT_BUNDLE_IDENTIFIER: com.dotenv.LokalBotV3UITests

  lokalbot-cli:
    type: tool
    platform: macOS
    sources:
      - CLI
      - LokalBot/CLISupport
      - path: LokalBot/Models/Meeting.swift
      - path: LokalBot/Models/Transcript.swift
      - path: LokalBot/Models/AppIdentifiers.swift
    dependencies:
      - package: ArgumentParser
        product: ArgumentParser
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.4"
        PRODUCT_NAME: lokalbot-cli
        PRODUCT_MODULE_NAME: lokalbot_cli
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: K96P3M3997
        ENABLE_HARDENED_RUNTIME: NO  # flip ON in notarised release builds
        GENERATE_INFOPLIST_FILE: YES
        # Embedded into LokalBotV3.app/Contents/Helpers rather than installed
        # as a standalone product, so keep it out of the archive's
        # install location.
        SKIP_INSTALL: YES
