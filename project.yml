name: LokalBot
options:
  bundleIdPrefix: com.dotenv
  deploymentTarget:
    macOS: "14.4"   # Core Audio process taps require 14.4+
  minimumXcodeGenVersion: "2.40"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: 0.15.2   # pinned: 0.x releases break API between minors
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    exactVersion: 1.0.0
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.3.0"

targets:
  LokalBot:
    type: application
    platform: macOS
    sources:
      - LokalBot
      - path: Vendor/llama-cpp
        type: folder
        buildPhase: resources
      - path: Vendor/llama-models
        type: folder
        buildPhase: resources
      # Bundle SKILL.md inside the app at Contents/Resources/lokalbot-cli/
      # so the installer can symlink it onto the user's PATH-adjacent skill
      # dirs without needing the source repo.
      - path: .agents/skills/lokalbot-cli/SKILL.md
        buildPhase:
          copyFiles:
            destination: resources
            subpath: lokalbot-cli
    dependencies:
      - package: FluidAudio
      - package: WhisperKit
      # Embed the self-contained CLI into Contents/Helpers/ and code-sign it
      # on copy (hardened runtime during a notarised archive). It's a target
      # dependency so it's built first; `link: false` because a tool is
      # copied, not linked into the app.
      - target: lokalbot-cli
        link: false
        embed: true
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Helpers
    preBuildScripts:
      - name: Fetch llama.cpp vendor
        script: "\"$PROJECT_DIR/Scripts/fetch-llama.sh\""
        basedOnDependencyAnalysis: false
    entitlements:
      path: LokalBot/LokalBot.entitlements
      properties:
        com.apple.security.device.audio-input: true
        # NOTE: App Sandbox intentionally OFF — Core Audio process taps
        # (and later, Accessibility window titles) don't work sandboxed.
        # Direct distribution + notarization, not App Store.
    info:
      path: LokalBot/Info.plist
      properties:
        CFBundleDisplayName: BotinaV2
        CFBundleIconFile: AppIcon
        NSMicrophoneUsageDescription: >-
          BotinaV2 records your side of meetings from the microphone.
          Audio never leaves this Mac.
        NSAudioCaptureUsageDescription: >-
          BotinaV2 records the meeting app's audio output so the other
          participants are captured. Audio never leaves this Mac.
        LSApplicationCategoryType: public.app-category.productivity
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.4"
        ENABLE_HARDENED_RUNTIME: NO   # turn ON (+ audio-input exception) for notarized release builds
        CODE_SIGN_STYLE: Automatic
        # Stable signature so TCC grants (Accessibility, Screen Recording)
        # survive rebuilds — ad-hoc signing invalidates them every build.
        DEVELOPMENT_TEAM: K96P3M3997
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: BotinaV2
        PRODUCT_MODULE_NAME: BotinaV2
        PRODUCT_BUNDLE_IDENTIFIER: com.dotenv.BotinaV2

  LokalBotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - LokalBotTests
    dependencies:
      - target: LokalBot
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BotinaV2.app/Contents/MacOS/BotinaV2"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: BotinaV2Tests
        PRODUCT_BUNDLE_IDENTIFIER: com.dotenv.BotinaV2Tests

  lokalbot-cli:
    type: tool
    platform: macOS
    sources:
      - CLI
      - LokalBot/CLISupport
      - path: LokalBot/Models/Meeting.swift
      - path: LokalBot/Models/Transcript.swift
      - path: LokalBot/Models/AppIdentifiers.swift
    dependencies:
      - package: ArgumentParser
        product: ArgumentParser
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.4"
        PRODUCT_NAME: lokalbot-cli
        PRODUCT_MODULE_NAME: lokalbot_cli
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: K96P3M3997
        ENABLE_HARDENED_RUNTIME: NO  # flip ON in notarised release builds
        GENERATE_INFOPLIST_FILE: YES
        # Embedded into BotinaV2.app/Contents/Helpers rather than installed
        # as a standalone product, so keep it out of the archive's
        # install location.
        SKIP_INSTALL: YES
