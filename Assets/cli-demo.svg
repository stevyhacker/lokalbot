<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 552" width="720" height="552" role="img" aria-labelledby="cliDemoTitle" xml:space="preserve" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
  <title id="cliDemoTitle">Animated terminal session: lokalbot-cli lists meetings as a table, searches transcripts for "redis" and returns JSON, then prints the latest meeting summary — read-only, straight from the local library.</title>
  <style>
    text { font-size: 12px; white-space: pre; }
    .t1 { animation: t1 18s steps(35, end) infinite; }
    .t2 { animation: t2 18s steps(27, end) infinite; }
    .t3 { animation: t3 18s steps(41, end) infinite; }
    .o1 { animation: o1 18s linear infinite; }
    .o2 { animation: o2 18s linear infinite; }
    .o3 { animation: o3 18s linear infinite; }
    .curw { animation: curw 18s linear infinite; }
    .cur { animation: blink 1.2s step-end infinite; }
    @keyframes t1 { 0%, 2.2% { clip-path: inset(0 100% 0 0); } 10.6%, 100% { clip-path: inset(0 0 0 0); } }
    @keyframes t2 { 0%, 20.6% { clip-path: inset(0 100% 0 0); } 27.8%, 100% { clip-path: inset(0 0 0 0); } }
    @keyframes t3 { 0%, 40% { clip-path: inset(0 100% 0 0); } 49.4%, 100% { clip-path: inset(0 0 0 0); } }
    @keyframes o1 { 0%, 12.7% { visibility: hidden; } 12.8%, 100% { visibility: visible; } }
    @keyframes o2 { 0%, 29.9% { visibility: hidden; } 30%, 100% { visibility: visible; } }
    @keyframes o3 { 0%, 51.6% { visibility: hidden; } 51.7%, 100% { visibility: visible; } }
    @keyframes curw { 0%, 52.9% { visibility: hidden; } 53%, 100% { visibility: visible; } }
    @keyframes blink { 0%, 49% { fill-opacity: 1; } 50%, 100% { fill-opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .t1, .t2, .t3, .o1, .o2, .o3, .curw, .cur { animation: none !important; }
    }
  </style>

  <!-- window -->
  <rect x="0.5" y="0.5" width="719" height="551" rx="12" fill="#0a0f16"/>
  <rect x="0.5" y="0.5" width="719" height="43.5" rx="12" fill="#0e1520"/>
  <rect x="0.5" y="24" width="719" height="20" fill="#0e1520"/>
  <line x1="0.5" y1="44" x2="719.5" y2="44" stroke="rgba(255,255,255,0.07)"/>
  <circle cx="22" cy="22" r="5.5" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="5.5" fill="#febc2e"/>
  <circle cx="58" cy="22" r="5.5" fill="#28c840"/>
  <text x="360" y="26" text-anchor="middle" fill="#778392" font-size="11">lokalbot-cli — 80×24</text>

  <!-- cmd 1: list (table) -->
  <text x="24" y="74" fill="#23c4ae">$</text>
  <text class="t1" x="38.5" y="74" fill="#dbe4ec">lokalbot-cli list <tspan fill="#6ef2dc">--limit</tspan> 3 <tspan fill="#6ef2dc">--table</tspan></text>

  <g class="o1">
    <text x="24" y="93" fill="#64707d">ID        Date              Duration  App          Title</text>
    <text x="24" y="112" fill="#64707d">────────  ────────────────  ────────  ───────────  ───────────────────</text>
    <text x="24" y="131" fill="#b4bfca">a1b2c3d4  2026-06-28 06:57  25 min    Zoom         Design review</text>
    <text x="24" y="150" fill="#b4bfca">7e0f2c9b  2026-06-28 05:37  15 min    Slack        Engineering standup</text>
    <text x="24" y="169" fill="#b4bfca">3d9a41f6  2026-06-27 07:37  30 min    Google Meet  Q3 roadmap planning</text>
    <text x="24" y="207" fill="#23c4ae">$</text>
  </g>

  <!-- $ lokalbot-cli search "redis" -->
  <text class="t2" x="38.5" y="207" fill="#dbe4ec">lokalbot-cli search <tspan fill="#f6c177">"redis"</tspan></text>

  <g class="o2">
    <text x="24" y="226" fill="#b4bfca">[</text>
    <text x="24" y="245" fill="#b4bfca">  {</text>
    <text x="24" y="264" fill="#b4bfca">    "match_kind" : "transcript",</text>
    <text x="24" y="283" fill="#b4bfca">    "meeting_id" : "a1b2c3d4",</text>
    <text x="24" y="302" fill="#b4bfca">    "meeting_title" : "Design review",</text>
    <text x="24" y="321" fill="#b4bfca">    "snippet" : "Let's lock the caching layer. I propose Redis for the pub-sub support.",</text>
    <text x="24" y="340" fill="#b4bfca">    "timestamp" : "00:00:12"</text>
    <text x="24" y="359" fill="#b4bfca">  }</text>
    <text x="24" y="378" fill="#b4bfca">]</text>
    <text x="24" y="416" fill="#23c4ae">$</text>
  </g>

  <!-- cmd 3: get latest summary -->
  <text class="t3" x="38.5" y="416" fill="#dbe4ec">lokalbot-cli get latest <tspan fill="#6ef2dc">--include</tspan> summary</text>

  <g class="o3">
    <text x="24" y="435" fill="#b4bfca">## Summary</text>
    <text x="24" y="454" fill="#b4bfca">## TL;DR</text>
    <text x="24" y="473" fill="#b4bfca">The team chose Redis for caching and deferred cluster mode pending a</text>
    <text x="24" y="492" fill="#b4bfca">failover benchmark.</text>
    <text x="24" y="530" fill="#23c4ae">$</text>
  </g>

  <g class="curw">
    <rect class="cur" x="38.5" y="519" width="7.2" height="14" fill="#6ef2dc"/>
  </g>

  <rect x="0.5" y="0.5" width="719" height="551" rx="12" fill="none" stroke="rgba(255,255,255,0.1)"/>
</svg>
